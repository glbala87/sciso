name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        pip install -e ".[all,dev]"
        pip install flake8

    - name: Lint with flake8
      run: |
        flake8 src/sciso/ --max-line-length=120 --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run tests with coverage
      run: |
        python -m pytest tests/ -v --tb=short --cov=sciso --cov-report=term-missing

    - name: Check imports
      run: |
        python -c "import sciso; print(sciso.__version__)"
        sciso --version
