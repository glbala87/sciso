name: iris-sc
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Core bioinformatics
  - python>=3.9,<3.14
  - pysam>=0.21
  - minimap2>=2.26
  - samtools>=1.17
  - bedtools>=2.31
  - stringtie>=2.2
  - gffcompare>=0.12
  - gffread>=0.12
  - seqkit>=2.5

  # Data science
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.11
  - polars>=0.20
  - h5py>=3.9
  - scikit-learn>=1.3

  # Single-cell analysis
  - scanpy>=1.9
  - anndata>=0.10
  - igraph>=0.11
  - umap-learn>=0.5
  - leidenalg>=0.10

  # Alignment and barcode tools
  - parasail-python>=1.3
  - rapidfuzz>=3.2
  - vsearch>=2.22

  # Visualization and reporting
  - bokeh>=3.1
  - matplotlib>=3.7

  # Pipeline
  - pip

  - pip:
    - ezcharts>=0.8
    - dominate>=2.8
    - numba>=0.58
